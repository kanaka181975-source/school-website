<section>
    <h1>School Admission Form</h1>
    <p>Fill in the details below to apply for admission.</p>

    <form>

        <input type="text" placeholder="Student Name" required>

        <input type="date" required>

        <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <select required>
            <option value="">Class Applying For</option>
            <option>Class 1</option>
            <option>Class 2</option>
            <option>Class 3</option>
            <option>Class 4</option>
            <option>Class 5</option>
            <option>Class 6</option>
            <option>Class 7</option>
            <option>Class 8</option>
            <option>Class 9</option>
            <option>Class 10</option>
        </select>

        <input type="text" placeholder="Parent/Guardian Name" required>

        <input type="tel" placeholder="Phone Number" required>

        <input type="email" placeholder="Email Address" required>

        <textarea rows="5" placeholder="Home Address" required></textarea>

        <button type="submit">Submit Application</button>
        <button type="reset">Reset</button>

    </form>
</section>
